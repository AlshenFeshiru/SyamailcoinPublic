<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syamailcoin Block Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1419; color: #e8eaed; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #1a1f2e; padding: 30px 0; margin-bottom: 40px; border-bottom: 2px solid #2d3748; }
        h1 { font-size: 2.5em; text-align: center; color: #60a5fa; }
        .subtitle { text-align: center; color: #94a3b8; margin-top: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1a1f2e; padding: 25px; border-radius: 10px; border: 1px solid #2d3748; }
        .stat-label { color: #94a3b8; font-size: 0.9em; margin-bottom: 8px; }
        .stat-value { font-size: 1.8em; color: #60a5fa; font-weight: bold; }
        .block-section { background: #1a1f2e; padding: 30px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #2d3748; }
        .block-title { font-size: 1.5em; margin-bottom: 20px; color: #60a5fa; }
        .block-field { margin-bottom: 15px; padding: 12px; background: #0f1419; border-radius: 5px; }
        .field-label { color: #94a3b8; font-size: 0.9em; margin-bottom: 5px; }
        .field-value { color: #e8eaed; word-break: break-all; font-family: 'Courier New', monospace; }
        .tx-list { margin-top: 20px; }
        .tx-item { background: #0f1419; padding: 15px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #60a5fa; }
        .loading { text-align: center; padding: 50px; color: #94a3b8; }
        .error { background: #7f1d1d; color: #fecaca; padding: 20px; border-radius: 5px; margin: 20px 0; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>⛓️ Syamailcoin Block Explorer</h1>
            <div class="subtitle">Gödel's Untouched Money - Blockrecursive Chain</div>
        </div>
    </header>

    <div class="container">
        <div class="stats-grid" id="stats"></div>
        <div class="block-section" id="genesis"></div>
        <div class="block-section" id="latest"></div>
    </div>

    <script>
        const API_BASE = 'http://104.248.155.98:8080/api';

        async function fetchData(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) throw new Error('API request failed');
                return await response.json();
            } catch (error) {
                console.error('Error fetching data:', error);
                return null;
            }
        }

        function formatHash(hash) {
            if (!hash) return 'N/A';
            return hash.length > 20 ? `${hash.substring(0, 10)}...${hash.substring(hash.length - 10)}` : hash;
        }

        function formatTimestamp(timestamp) {
            return new Date(timestamp).toLocaleString();
        }

        async function loadStats() {
            const stats = await fetchData('/stats');
            const supply = await fetchData('/supply');
            
            if (!stats || !supply) {
                document.getElementById('stats').innerHTML = '<div class="error">Failed to load stats</div>';
                return;
            }

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Blocks</div>
                    <div class="stat-value">${stats.totalBlocks}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Supply</div>
                    <div class="stat-value">${parseFloat(supply.total).toLocaleString()} SAC</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Genesis Locked</div>
                    <div class="stat-value">${parseFloat(supply.genesis).toLocaleString()} SAC</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Remaining Supply</div>
                    <div class="stat-value">${parseFloat(supply.remaining).toLocaleString()} SAC</div>
                </div>
            `;
        }

        async function loadGenesis() {
            const genesis = await fetchData('/genesis');
            
            if (!genesis) {
                document.getElementById('genesis').innerHTML = '<div class="error">Failed to load genesis block</div>';
                return;
            }

            const tx = genesis.transactions && genesis.transactions[0];
            
            document.getElementById('genesis').innerHTML = `
                <div class="block-title">Genesis Block</div>
                <div class="block-field">
                    <div class="field-label">Hash</div>
                    <div class="field-value">${genesis.hash}</div>
                </div>
                <div class="block-field">
                    <div class="field-label">Index</div>
                    <div class="field-value">${genesis.index}</div>
                </div>
                <div class="block-field">
                    <div class="field-label">Timestamp</div>
                    <div class="field-value">${formatTimestamp(genesis.timestamp)}</div>
                </div>
                <div class="block-field">
                    <div class="field-label">Commitment</div>
                    <div class="field-value">${genesis.commitment || 'N/A'}</div>
                </div>
                <div class="block-field">
                    <div class="field-label">Proof Value</div>
                    <div class="field-value">${genesis.proofValue}</div>
                </div>
                ${tx ? `
                <div class="tx-list">
                    <div class="field-label">Genesis Transaction</div>
                    <div class="tx-item">
                        <div class="field-label">From</div>
                        <div class="field-value">${tx.sender}</div>
                        <div class="field-label" style="margin-top:10px">To (Genesis Address)</div>
                        <div class="field-value">${tx.recipient}</div>
                        <div class="field-label" style="margin-top:10px">Amount</div>
                        <div class="field-value">${parseFloat(tx.amount).toLocaleString()} SAC</div>
                        <div class="field-label" style="margin-top:10px">Status</div>
                        <div class="field-value" style="color:#ef4444">🔒 LOCKED (No private key)</div>
                    </div>
                </div>
                ` : ''}
            `;
        }

        async function loadLatest() {
            const latest = await fetchData('/latest');
            
            if (!latest) {
                document.getElementById('latest').innerHTML = '<div class="error">Failed to load latest block</div>';
                return;
            }

            document.getElementById('latest').innerHTML = `
                <div class="block-title">Latest Block</div>
                <div class="block-field">
                    <div class="field-label">Hash</div>
                    <div class="field-value">${latest.hash}</div>
                </div>
                <div class="block-field">
                    <div class="field-label">Index</div>
                    <div class="field-value">${latest.index}</div>
                </div>
                <div class="block-field">
                    <div class="field-label">Timestamp</div>
                    <div class="field-value">${formatTimestamp(latest.timestamp)}</div>
                </div>
                <div class="block-field">
                    <div class="field-label">Previous Block</div>
                    <div class="field-value">${formatHash(latest.previousReference)}</div>
                </div>
                <div class="block-field">
                    <div class="field-label">Transactions</div>
                    <div class="field-value">${latest.transactions ? latest.transactions.length : 0}</div>
                </div>
            `;
        }

        async function init() {
            document.getElementById('stats').innerHTML = '<div class="loading">Loading stats...</div>';
            document.getElementById('genesis').innerHTML = '<div class="loading">Loading genesis...</div>';
            document.getElementById('latest').innerHTML = '<div class="loading">Loading latest block...</div>';
            
            await Promise.all([
                loadStats(),
                loadGenesis(),
                loadLatest()
            ]);
        }

        init();
        setInterval(init, 10000);
    </script>
</body>
</html>
